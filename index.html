<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Not Available</title>
    <style>
        :root {
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gradient: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-main);
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 40px 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background-color: #fee2e2;
            border-radius: 50%;
        }

        .icon {
            width: 32px;
            height: 32px;
            stroke: #ef4444;
            stroke-width: 2;
            fill: none;
        }

        .domain-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            word-break: break-all;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: inline-block;
            background: #f3f4f6;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 32px auto;
            width: 60px;
        }

        .back-link {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .domain-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <!-- Simple structural Lock Icon -->
            <svg class="icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>

        <h1 class="domain-name" id="domain-text">bputnotes.in</h1>
        <div class="status-badge">Not Available</div>
        
        <p class="message">
            This domain is currently registered and is not active or available for purchase at this time. Please check back later or try a different address.
        </p>

        <div class="divider"></div>
        
        <a href="javascript:history.back()" class="back-link">&larr; Go Back</a>
    </div>

    <script>
        // Automatically grabs and displays the active URL domain
        const currentDomain = window.location.hostname;
        if (currentDomain && currentDomain !== '127.0.0.1' && currentDomain !== 'localhost') {
            document.getElementById('domain-text').innerText = currentDomain;
        }
    </script>
</body>
</html>
